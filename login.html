<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - KOKYUDRAW</title>

    <link rel="stylesheet" href="relog/stylerelog.css">

</head>


<body>


<div class="auth-container">


    <div class="auth-box">


        <h2>Login</h2>


       <input 
type="email"
id="loginEmail"
placeholder="Email"
autocomplete="email">

        <input 
type="password"
id="loginPassword"
placeholder="Password"
autocomplete="current-password">


        <button id="loginBtn">
            Login
        </button>


        <p>
            Belum punya akun?
            <a href="register.html">
                Daftar
            </a>
        </p>


    </div>


</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="relog/authrelog.js"></script>
</body>

</html>
