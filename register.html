<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register - KOKYUDRAW</title>

    <link rel="stylesheet" href="relog/stylerelog.css">

</head>


<body>


<div class="auth-container">


    <div class="auth-box">


        <h2>Create Account</h2>


        <input 
type="text"
id="username"
placeholder="Username"
autocomplete="username">


        <input 
type="email"
id="registerEmail"
placeholder="Email"
autocomplete="email">


        <input 
type="password"
id="registerPassword"
placeholder="Password"
autocomplete="new-password">


        <button id="registerBtn">
            Daftar
        </button>


        <p>
            Sudah punya akun?
            <a href="login.html">
                Login
            </a>
        </p>


    </div>


</div>




<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="relog/authrelog.js"></script>

</body>

</html>
